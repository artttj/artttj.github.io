<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artyom Yagovdik</title>
    <link rel="canonical" href="https://artttj.de/">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.18);
            --glass-blur: 24px;
            --orb-size: 88px;
            --text-primary: rgba(255, 255, 255, 0.92);
            --text-secondary: rgba(255, 255, 255, 0.55);
            --accent: #6eb5ff;
            --bg: #0a0a0f;
            --logo-invert: 1;
            --blob-1-a: #1a3a6e;
            --blob-1-b: #0d1f3c;
            --blob-2-a: #2a1a4e;
            --blob-2-b: #150d30;
            --blob-3-a: #0e3a3a;
            --blob-3-b: #091e1e;
            --blob-opacity: 0.35;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --project-hover-bg: rgba(255, 255, 255, 0.07);
            --project-bg: rgba(255, 255, 255, 0.03);
        }

        [data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.7);
            --text-primary: rgba(0, 0, 0, 0.85);
            --text-secondary: rgba(0, 0, 0, 0.45);
            --accent: #3b7dd8;
            --bg: #e8e4df;
            --logo-invert: 0;
            --blob-1-a: #a8c4e6;
            --blob-1-b: #c5d8ee;
            --blob-2-a: #c4b0e0;
            --blob-2-b: #d9cdef;
            --blob-3-a: #a0cfc8;
            --blob-3-b: #bde0db;
            --blob-opacity: 0.5;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --project-hover-bg: rgba(0, 0, 0, 0.05);
            --project-bg: rgba(0, 0, 0, 0.02);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            color: var(--text-primary);
            overflow: hidden;
            transition: background 0.6s ease;
        }

        .ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: var(--blob-opacity);
            animation: drift 20s ease-in-out infinite alternate;
            transition: background 0.6s ease, opacity 0.6s ease;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--blob-1-a), var(--blob-1-b));
            top: -15%;
            left: -10%;
            animation-duration: 22s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--blob-2-a), var(--blob-2-b));
            bottom: -10%;
            right: -8%;
            animation-duration: 18s;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--blob-3-a), var(--blob-3-b));
            top: 40%;
            left: 55%;
            animation-duration: 25s;
            animation-delay: -10s;
        }

        @keyframes drift {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(60px, -40px) scale(1.1); }
            66%  { transform: translate(-30px, 50px) scale(0.95); }
            100% { transform: translate(40px, 20px) scale(1.05); }
        }

        .card-wrap {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #toggle { display: none; }

        .orb {
            width: var(--orb-size);
            height: var(--orb-size);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            box-shadow:
                0 8px 32px var(--shadow-color),
                inset 0 1px 0 var(--glass-highlight),
                0 0 0 1px rgba(0, 0, 0, 0.08);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.5s ease,
                        background 0.4s ease;
            animation: float 6s ease-in-out infinite;
            z-index: 2;
        }

        .orb::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                rgba(110, 181, 255, 0.15) 25%,
                transparent 50%,
                rgba(160, 120, 255, 0.12) 75%,
                transparent 100%
            );
            animation: shimmer 8s linear infinite;
            z-index: -1;
        }

        @keyframes shimmer {
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .orb:hover {
            box-shadow:
                0 12px 48px rgba(110, 181, 255, 0.15),
                inset 0 1px 0 var(--glass-highlight),
                0 0 0 1px rgba(0, 0, 0, 0.2);
        }

        .orb img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            pointer-events: none;
            filter: invert(var(--logo-invert));
            opacity: 0.85;
            transition: filter 0.4s ease;
        }

        .panel {
            margin-top: 20px;
            width: 320px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px) scale(0.96);
            border-radius: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            box-shadow:
                0 8px 32px var(--shadow-color),
                inset 0 1px 0 var(--glass-highlight);
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.4s ease,
                        transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        background 0.4s ease,
                        box-shadow 0.4s ease;
        }

        #toggle:checked ~ .orb {
            animation: none;
            transform: scale(0.92);
            box-shadow:
                0 4px 16px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 var(--glass-highlight),
                0 0 24px rgba(110, 181, 255, 0.1);
        }

        #toggle:checked ~ .panel {
            max-height: 620px;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .panel-inner {
            padding: 28px 24px 24px;
        }

        .profile {
            text-align: center;
            margin-bottom: 24px;
        }

        .profile h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .profile p {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .profile .links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 14px;
        }

        .profile .links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 8px;
            background: var(--project-bg);
        }

        .profile .links a:hover {
            color: var(--accent);
            background: var(--project-hover-bg);
        }

        .profile .links a svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .profile .links a .link-icon {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .sonto-feature {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-primary);
            background: var(--project-bg);
            border: 1px solid transparent;
            transition: background 0.2s, border-color 0.25s, transform 0.2s;
        }

        .sonto-feature:hover {
            background: var(--project-hover-bg);
            border-color: var(--glass-border);
            transform: translateX(4px);
        }

        .sonto-wordmark {
            height: 32px;
            width: auto;
            object-fit: contain;
            border-radius: 8px;
            filter: invert(var(--logo-invert));
            transition: filter 0.4s ease;
        }

        .sonto-feature .sonto-info {
            min-width: 0;
        }

        .sonto-feature .sonto-info span {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .divider {
            height: 1px;
            background: var(--glass-border);
            margin-bottom: 20px;
        }

        .projects-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .project-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-primary);
            background: var(--project-bg);
            border: 1px solid transparent;
            transition: background 0.2s, border-color 0.25s, transform 0.2s, color 0.4s;
        }

        .project-link:hover {
            background: var(--project-hover-bg);
            border-color: var(--glass-border);
            transform: translateX(4px);
        }

        .project-link img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .project-info {
            min-width: 0;
        }

        .project-name {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 10px;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 6px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .badge-live {
            background: rgba(80, 200, 120, 0.15);
            color: #50c878;
        }

        .badge-beta {
            background: rgba(110, 181, 255, 0.15);
            color: var(--accent);
        }

        .project-desc {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            line-height: 1;
            box-shadow: 0 4px 16px var(--shadow-color);
            transition: background 0.3s, border-color 0.3s, transform 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        .theme-toggle .icon-sun,
        .theme-toggle .icon-moon { transition: opacity 0.3s, transform 0.3s; position: absolute; }

        .theme-toggle .icon-sun  { opacity: 0; transform: rotate(-90deg) scale(0.5); }
        .theme-toggle .icon-moon { opacity: 1; transform: rotate(0) scale(1); }

        [data-theme="light"] .theme-toggle .icon-sun  { opacity: 1; transform: rotate(0) scale(1); }
        [data-theme="light"] .theme-toggle .icon-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }

        @media (max-width: 400px) {
            .panel { width: calc(100vw - 40px); }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" aria-label="Toggle theme">
        <span class="icon-moon">&#9790;</span>
        <span class="icon-sun">&#9728;</span>
    </button>

    <div class="ambient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="card-wrap">
        <input type="checkbox" id="toggle">

        <label class="orb" for="toggle">
            <img src="assets/img/logo.png" alt="AY">
        </label>

        <div class="panel">
            <div class="panel-inner">
                <div class="profile">
                    <h1>Artyom Yagovdik</h1>
                    <p>Software Engineer</p>
                    <div class="links">
                        <a href="https://github.com/artttj"><svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>github</a>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="projects-label">Projects</div>
                <div class="project-list">
                    <a class="sonto-feature" href="https://sonto.tech" target="_blank" rel="noopener">
                        <img class="sonto-wordmark" src="assets/img/sonto-logo.png" alt="Sonto">
                        <div class="sonto-info">
                            <div class="project-name">Sonto <span class="badge badge-live">Live</span></div>
                            <span>Tech news feed curated by AI agents</span>
                        </div>
                    </a>
                    <a class="project-link" href="https://github.com/artttj/sento" target="_blank" rel="noopener">
                        <img src="assets/img/projects/sento-icon.png" alt="Sento">
                        <div class="project-info">
                            <div class="project-name">Sento <span class="badge badge-live">Live</span></div>
                            <div class="project-desc">AI writing layer for any web interface</div>
                        </div>
                    </a>
                    <a class="project-link" href="https://github.com/artttj/synto" target="_blank" rel="noopener">
                        <img src="assets/img/projects/synto-icon.png" alt="Synto">
                        <div class="project-info">
                            <div class="project-name">Synto <span class="badge badge-live">Live</span></div>
                            <div class="project-desc">Web to structured data for LLM pipelines</div>
                        </div>
                    </a>
                    <a class="project-link" href="https://github.com/artttj/nemo" target="_blank" rel="noopener">
                        <img src="assets/img/projects/nemo-icon.png" alt="Nemo">
                        <div class="project-info">
                            <div class="project-name">Nemo <span class="badge badge-beta">Beta</span></div>
                            <div class="project-desc">Zero-knowledge password security</div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script>
        (function() {
            var saved = localStorage.getItem('theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
            document.querySelector('.theme-toggle').addEventListener('click', function() {
                var next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });
        })();
    </script>
</body>
</html>
