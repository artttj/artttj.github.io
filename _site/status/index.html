<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Workstation // Artyom Yagovdik</title>
    <link rel="stylesheet" href="/assets/css/fonts.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-hover: #1a1a1a;
            --border: #2a2a2a;
            --border-strong: #333;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --accent: #fff;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --transition: cubic-bezier(0.22, 1, 0.36, 1);
        }

        html[data-theme="light"] {
            --bg: #fafafa;
            --surface: #fff;
            --surface-hover: #f5f5f5;
            --border: #e5e5e5;
            --border-strong: #ddd;
            --text-primary: #111;
            --text-secondary: #555;
            --text-muted: #999;
            --accent: #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 2rem;
        }

        @media (min-width: 1400px) {
            .container {
                padding: 2rem 4rem;
            }
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-primary);
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: var(--surface);
            border: 1px solid var(--border-strong);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Crimson Pro', serif;
            font-style: italic;
            font-size: 1rem;
        }

        .brand-text {
            font-family: 'Crimson Pro', serif;
            font-size: 1.25rem;
            font-weight: 500;
            font-style: italic;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s var(--transition);
        }

        .theme-toggle:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .status-pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.25rem;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-family: 'Crimson Pro', serif;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .stat-value.small {
            font-size: 1rem;
            font-family: 'Instrument Sans', sans-serif;
            font-weight: 600;
        }

        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: all 0.25s var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--success);
            transform: scaleX(0);
            transition: transform 0.3s var(--transition);
        }

        .card:hover {
            border-color: var(--border-strong);
            background: var(--surface-hover);
            transform: translateY(-2px);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-type {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .card-status {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.65rem;
            color: var(--success);
            font-weight: 600;
        }

        .card-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .card-body {
            padding: 1.25rem;
            flex: 1;
        }

        .card-title {
            font-family: 'Crimson Pro', serif;
            font-size: 1.35rem;
            font-weight: 500;
            font-style: italic;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .card-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .card-meta {
            padding: 0.75rem 1.25rem;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        html[data-theme="light"] .card-meta {
            background: rgba(0,0,0,0.02);
        }

        .card-meta .url {
            font-family: monospace;
            opacity: 0.7;
        }

        .card-meta .arrow {
            transition: transform 0.2s var(--transition);
        }

        .card:hover .card-meta .arrow {
            transform: translateX(4px);
        }

        /* Section Headers */
        .section {
            margin-bottom: 3rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .section-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Footer */
        .footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .footer-badge {
            padding: 0.3rem 0.6rem;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 0.6rem;
        }

        /* Clock */
        #clock {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                grid-template-columns: 1fr;
            }
            .header-meta {
                gap: 1rem;
            }
            .status-pill span:not(.dot) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="/" class="brand" style="text-decoration: none; color: var(--text-primary);">
                <span class="brand-text">Status</span>
            </a>
            <div class="header-meta">
                <button class="theme-toggle" id="themeToggle">◑</button>
                <div id="clock">00:00:00</div>
            </div>
        </header>

        <section class="section" style="flex: 1; display: flex; flex-direction: column;">
            <div class="section-header">
                <span class="section-title">System Status</span>
                <div class="section-line"></div>
            </div>
            <div style="border: 1px solid var(--border); background: var(--surface); flex: 1; min-height: 0; overflow: hidden; border-radius: 2px; display: flex; flex-direction: column;">
                <iframe src="https://status.artttj.de/status/default" frameborder="0" width="100%" height="70vh" style="flex: 1; display: block; margin: 0; border: none; background: var(--bg);"></iframe>
            </div>
        </section>

        <footer class="footer">
            <div>WKS // v2.3</div>
            <div>&copy; 2026</div>
        </footer>
    </div>

    <script>
        // Clock
        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ':' + 
                         now.getMinutes().toString().padStart(2, '0') + ':' + 
                         now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Theme Toggle
        (function() {
            const toggle = document.getElementById('themeToggle');
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else if (saved === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
            
            toggle.addEventListener('click', function() {
                const current = document.documentElement.getAttribute('data-theme');
                if (current === 'light') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                }
            });
        })();
    </script>
</body>
</html>
