<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Workstation — Artyom Yagovdik</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfcfc;
            --text-main: #0a0a0a;
            --text-light: #4a4a4a;
            --text-extra-light: #8a8a8a;
            --border: #e5e5e5;
            --accent: #000000;
            --transition-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Instrument Sans', sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 10vh 2rem;
        }

        header {
            margin-bottom: 8vh;
        }

        header a {
            text-decoration: none;
            color: var(--text-extra-light);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 600;
            transition: color 0.2s;
        }

        header a:hover {
            color: var(--accent);
        }

        h1 {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 300;
            font-style: italic;
            margin: 2rem 0;
            letter-spacing: -0.02em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .cell {
            background: var(--bg);
            padding: 4rem 2rem;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: background 0.3s var(--transition-smooth);
        }

        .cell:hover {
            background: #fdfdfd;
        }

        .cell h3 {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--text-extra-light);
            font-weight: 700;
        }

        .cell .title {
            font-family: 'Crimson Pro', serif;
            font-size: 1.8rem;
            color: var(--accent);
            font-weight: 400;
        }

        .cell .status {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #22c55e;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cell .status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: currentColor;
            border-radius: 50%;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }

        footer {
            margin-top: 8vh;
            font-size: 0.65rem;
            color: var(--text-extra-light);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/">← Return</a>
        </header>

        <h1>Workstation</h1>

        <div class="grid">
            <a href="http://212.227.206.248:81" target="_blank" rel="noopener" class="cell">
                <h3>Reverse Proxy</h3>
                <div class="title">Nginx Proxy</div>
                <div class="status">Active</div>
            </a>
            <a href="http://212.227.206.248:8888" target="_blank" rel="noopener" class="cell">
                <h3>Logging</h3>
                <div class="title">Dozzle</div>
                <div class="status">Active</div>
            </a>
            <a href="http://212.227.206.248:3001" target="_blank" rel="noopener" class="cell">
                <h3>Monitoring</h3>
                <div class="title">Uptime Kuma</div>
                <div class="status">Active</div>
            </a>
        </div>

        <footer>
            © 2026 INTERNAL ACCESS
        </footer>
    </div>
</body>
</html>
